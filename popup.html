<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenEn</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fff;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo {
      font-size: 15px;
      font-weight: 700;
      color: #2563eb;
      letter-spacing: -0.3px;
    }
    .site-name {
      font-size: 12px;
      color: #888;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ===== Status ===== */
    .status-section {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .status-label {
      color: #666;
      font-size: 12px;
    }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
    }
    .badge-active { background: #dbeafe; color: #1d4ed8; }
    .badge-paused { background: #fef3c7; color: #92400e; }
    .badge-disabled { background: #f3f4f6; color: #6b7280; }
    .badge-scan { background: #ecfdf5; color: #065f46; }
    .badge-deep { background: #ede9fe; color: #5b21b6; }
    .badge-nokey { background: #fef2f2; color: #991b1b; }

    /* ===== Controls ===== */
    .controls {
      padding: 0 16px 12px;
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 7px 0;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn:hover { background: #f9fafb; border-color: #d1d5db; }
    .btn:active { background: #f3f4f6; }
    .btn-danger { color: #dc2626; border-color: #fecaca; }
    .btn-danger:hover { background: #fef2f2; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; }

    /* ===== Divider ===== */
    .divider { border-top: 1px solid #f0f0f0; }

    /* ===== LLM Config ===== */
    .config-section {
      padding: 0 16px 14px;
    }
    .config-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
    }
    .config-toggle-label {
      font-size: 12px;
      font-weight: 600;
      color: #374151;
    }
    .config-toggle-arrow {
      font-size: 10px;
      color: #9ca3af;
      transition: transform 0.2s;
    }
    .config-toggle-arrow.open { transform: rotate(90deg); }

    .config-form {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding-bottom: 4px;
    }
    .config-form.visible { display: flex; }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .form-label {
      font-size: 11px;
      color: #6b7280;
      font-weight: 500;
    }
    .form-input, .form-select {
      padding: 6px 8px;
      border: 1px solid #e5e7eb;
      border-radius: 5px;
      font-size: 12px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus {
      border-color: #93c5fd;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
    }
    .form-input::placeholder { color: #c0c0c0; }

    .openai-field { display: none; }
    .openai-field.visible { display: flex; }

    .save-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .save-msg {
      font-size: 11px;
      color: #16a34a;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .save-msg.show { opacity: 1; }

    /* ===== Footer ===== */
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #f0f0f0;
      text-align: center;
    }
    .footer a {
      font-size: 11px;
      color: #9ca3af;
      text-decoration: none;
    }
    .footer a:hover { color: #6b7280; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <span class="logo">OpenEn</span>
        <span class="site-name" id="site-name">—</span>
      </div>
    </div>

    <!-- Status -->
    <div class="status-section">
      <div class="status-row">
        <span class="status-label">状态</span>
        <span class="badge" id="status-badge">—</span>
      </div>
      <div class="status-row">
        <span class="status-label">模式</span>
        <span class="badge" id="mode-badge">—</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn" id="btn-toggle">在此站点禁用</button>
      <button class="btn" id="btn-pause">暂停</button>
    </div>

    <div class="divider"></div>

    <!-- Chunk Settings -->
    <div class="config-section">
      <div class="config-toggle" id="chunk-toggle">
        <span class="config-toggle-label">拆分设置</span>
        <span class="config-toggle-arrow" id="chunk-arrow">▶</span>
      </div>
      <div class="config-form" id="chunk-form">
        <div class="form-group">
          <span class="form-label">拆多细</span>
          <select class="form-select" id="chunk-granularity">
            <option value="fine">细 — 在介词、引语处也断行</option>
            <option value="medium">中 — 在连词、从句处断行</option>
            <option value="coarse">粗 — 只在逗号+连词处断行</option>
          </select>
          <span class="form-label" style="color:#9ca3af;font-size:10px;">改完即时生效，当前页面会重新拆分</span>
        </div>
        <div class="form-group">
          <span class="form-label">显示方式</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <input type="range" id="intensity-slider" min="1" max="5" step="1" style="flex:1;" />
            <span id="intensity-value" style="font-size:12px;color:#374151;min-width:16px;text-align:center;">5</span>
          </div>
          <span class="form-label" style="color:#9ca3af;font-size:10px;">5 = 分行+缩进 / 3 = 只分行 / 1 = 主干加粗</span>
        </div>
        <div class="form-group">
          <span class="form-label">自动拆分门槛（细读模式）</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <input type="range" id="sensitivity-slider" min="1" max="5" step="1" style="flex:1;" />
            <span id="sensitivity-value" style="font-size:12px;color:#374151;min-width:16px;text-align:center;">3</span>
          </div>
          <span class="form-label" style="color:#9ca3af;font-size:10px;">越低 = 越多句子自动拆分（扫读模式全自动，不受此项影响）</span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- LLM Config -->
    <div class="config-section">
      <div class="config-toggle" id="config-toggle">
        <span class="config-toggle-label">LLM 配置</span>
        <span class="config-toggle-arrow" id="config-arrow">▶</span>
      </div>
      <div class="config-form" id="config-form">
        <div class="form-group">
          <span class="form-label">API 格式</span>
          <select class="form-select" id="llm-format">
            <option value="gemini">Gemini</option>
            <option value="openai-compatible">OpenAI 兼容（DeepSeek、Kimi 等）</option>
          </select>
        </div>
        <div class="form-group">
          <span class="form-label">API Key</span>
          <input type="password" class="form-input" id="llm-key" placeholder="输入你的 API Key" />
        </div>
        <div class="form-group openai-field" id="url-group">
          <span class="form-label">Base URL</span>
          <input type="text" class="form-input" id="llm-url" placeholder="https://api.deepseek.com/v1" />
        </div>
        <div class="form-group">
          <span class="form-label">模型</span>
          <input type="text" class="form-input" id="llm-model" placeholder="gemini-2.0-flash" />
        </div>
        <div class="save-row">
          <span class="save-msg" id="save-msg">已保存</span>
          <button class="btn btn-primary" id="btn-save" style="flex:none;padding:6px 16px;">保存</button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a id="link-options">打开设置页</a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
